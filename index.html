<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altın, Borsa ve Piyasa Analizleri</title>
    <style>
        * { boxsizing: borderbox; margin: 0; padding: 0; }
        body { 
            fontfamily: 'Segoe UI', Tahoma, Geneva, Verdana, sansserif; 
            background: #0a0a0c; 
            color: #e2e8f0; 
            padding: 15px; 
        }
        .container { maxwidth: 1400px; margin: 0 auto; }
        
        .nav-buttons { 
            display: flex; 
            justifycontent: center; 
            gap: 12px; 
            margin: 15px 0 25px; 
            flexwrap: wrap; 
        }
        .nav-btn { 
            padding: 10px 24px; 
            borderradius: 30px; 
            textdecoration: none; 
            fontweight: bold; 
            fontsize: 14px; 
            transition: all 0.3s; 
            border: none; 
            cursor: pointer; 
            display: inlineblock; 
        }
        .nav-btn-primary { 
            background: #ff4500; 
            color: #fff; 
            boxshadow: 0 4px 15px rgba(255,69,0,0.3); 
        }
        .nav-btn-primary:hover { 
            background: #ff6a00; 
            transform: scale(1.05); 
        }
        .nav-btn-secondary { 
            background: #1e293b; 
            color: #60a5fa; 
            border: 1px solid #60a5fa;
        }
        .nav-btn-secondary:hover { 
            background: #334155; 
            transform: scale(1.05); 
        }
        .nav-btn-gold { 
            background: #78350f; 
            color: #fbbf24; 
            border: 1px solid #f59e0b;
        }
        .nav-btn-gold:hover { 
            background: #92400e; 
            transform: scale(1.05); 
        }
        .nav-btn-green { 
            background: #064e3b; 
            color: #34d399; 
            border: 1px solid #10b981;
        }
        .nav-btn-green:hover { 
            background: #065f46; 
            transform: scale(1.05); 
        }
        .nav-btn-vodafone {
            background: #e60000;
            color: #ffffff;
            border: 1px solid #b30000;
            boxshadow: 0 4px 12px rgba(230,0,0,0.2);
        }
        .nav-btn-vodafone:hover {
            background: #ff1a1a;
            transform: scale(1.05);
        }
        .nav-btn-faturali {
            background: #4a0404;
            color: #fca5a5;
            border: 1px solid #ef4444;
        }
        .nav-btn-faturali:hover {
            background: #7f1d1d;
            color: #fff;
            transform: scale(1.05);
        }
        .nav-btn-fiber {
            background: #0f172a;
            color: #38bdf8;
            border: 1px solid #0284c7;
            boxshadow: 0 4px 12px rgba(2,132,199,0.2);
        }
        .nav-btn-fiber:hover {
            background: #1e293b;
            color: #7dd3fc;
            transform: scale(1.05);
        }
        
        .mutinous-finance-container {
            background: #121214;
            color: #e2e8f0;
            borderradius: 12px;
            padding: 24px;
            maxwidth: 1200px;
            margin: 30px auto;
            border: 1px solid #222227;
            boxshadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .finance-header {
            display: flex;
            justifycontent: spacebetween;
            alignitems: center;
            borderbottom: 2px solid #1e1e24;
            paddingbottom: 16px;
            marginbottom: 20px;
            flexwrap: wrap;
            gap: 12px;
        }
        .header-title-zone h2 { margin: 0; fontsize: 24px; color: #fff; lettersacing: 0.5px; }
        .brand-sub { margin: 4px 0 0 0; fontsize: 13px; color: #60a5fa; fontweight: 500; lettersacing: 0.3px; }
        .update-badge { 
            background: #064e3b; 
            color: #34d399;
            padding: 8px 18px; 
            borderradius: 20px; 
            fontsize: 13px; 
            fontweight: 700; 
            border: 2px solid #10b981;
            animation: pulsegreen 2s easeinout infinite;
        }
        @keyframes pulsegreen {
            0%, 100% { boxshadow: 0 0 20px rgba(16, 185, 129, 0.2); }
            50% { boxshadow: 0 0 40px rgba(16, 185, 129, 0.5); }
        }
        
        .finance-tabs { display: flex; gap: 6px; marginbottom: 20px; borderbottom: 1px solid #1e1e24; paddingbottom: 10px; flexwrap: wrap; }
        .tab-btn { background: #1e1e24; border: 1px solid #2d2d39; color: #94a3b8; padding: 10px 16px; borderradius: 6px; cursor: pointer; fontweight: 600; fontsize: 13px; transition: all 0.2s ease; }
        .tab-btn:hover { background: #2a2a35; color: #fff; }
        .tab-btn.active { background: #ff4500; color: #fff; bordercolor: #ff4500; }
        .calc-btn { bordercolor: #3b82f6; color: #60a5fa; }
        .calc-btn.active { background: #3b82f6; bordercolor: #3b82f6; color: #fff; }
        .interest-btn { bordercolor: #10b981; color: #34d399; }
        .interest-btn.active { background: #10b981; bordercolor: #10b981; color: #fff; }
        
        .finance-tab-content { display: none; }
        .finance-tab-content.active { display: block; }
        .finance-table-wrapper { maxheight: 480px; overflowy: auto; borderradius: 8px; border: 1px solid #1e1e24; }
        .finance-table { width: 100%; bordercollapse: collapse; textalign: left; fontsize: 14px; }
        .finance-table th { background: #1e1e24; color: #94a3b8; padding: 12px 16px; fontweight: 600; position: sticky; top: 0; zindex: 2; }
        .finance-table td { padding: 12px 16px; borderbottom: 1px solid #1a1a22; color: #cbd5e1; }
        .finance-table tbody tr:hover { background: #181820; }
        .finance-table tr td:first-child { color: #fff; }
        
        .txt-up { color: #10b981; fontweight: 600; }
        .txt-down { color: #ef4444; fontweight: 600; }
        .txt-neutral { color: #64748b; fontweight: 600; }
        
        .calculator-box { background: #18181c; border: 1px solid #24242b; padding: 20px; borderradius: 8px; }
        .calculator-box h4 { margin: 0 0 15px 0; fontsize: 16px; color: #fff; }
        .calc-row { display: flex; gap: 15px; flexwrap: wrap; marginbottom: 20px; }
        .input-group { flex: 1; minwidth: 150px; display: flex; flexdirection: column; gap: 6px; }
        .input-group label { fontweight: 500; }
        .input-group input, .input-group select { background: #121214; border: 1px solid #2d2d39; color: #fff; padding: 10px; borderradius: 6px; fontsize: 14px; outline: none; }
        .input-group input:focus, .input-group select:focus { bordercolor: #3b82f6; }
        .calc-result-zone { background: #1e293b; borderleft: 4px solid #3b82f6; padding: 15px; borderradius: 6px; display: flex; flexdirection: column; gap: 4px; }
        .result-label { fontsize: 12px; color: #94a3b8; }
        #calc-result-value { fontsize: 22px; fontweight: bold; color: #3b82f6; }
        
        .interest-results-wrapper { display: flex; gap: 15px; flexwrap: wrap; }
        .interest-result-card { flex: 1; minwidth: 200px; background: #1e293b; padding: 15px; borderradius: 6px; borderleft: 4px solid #10b981; }
        #interest-net-gain { fontsize: 22px; fontweight: bold; }
        #interest-total-amount { fontsize: 22px; fontweight: bold; color: #fff; }
        
        .banknote { background: #1e293b; borderleft: 4px solid #fbbf24; padding: 10px 15px; borderradius: 6px; margintop: 10px; fontsize: 13px; color: #fbbf24; }
        .banknote strong { color: #fff; }
        .banknote a { color: #60a5fa; textdecoration: none; }
        .banknote a:hover { textdecoration: underline; }
        .finance-footer { margintop: 20px; paddingtop: 15px; bordertop: 1px solid #1e1e24; display: flex; justifycontent: spacebetween; alignitems: center; flexwrap: wrap; gap: 10px; fontsize: 12px; color: #64748b; }
        .warning-text { color: #ef4444; fontweight: 700; fontsize: 12px; }
        .footer { textalign: center; margintop: 20px; color: #64748b; fontsize: 14px; }
        .footer a { color: #ff4500; textdecoration: none; }
        .footer a:hover { textdecoration: underline; }
        .finance-table-wrapper::-webkit-scrollbar { width: 6px; }
        .finance-table-wrapper::-webkit-scrollbar-track { background: #121214; }
        .finance-table-wrapper::-webkit-scrollbar-thumb { background: #2d2d39; borderradius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-buttons">
            <a href="https://piyasaanaliz.github.io" target="_blank" class="nav-btn nav-btn-secondary">🏠 Ana Sayfa</a>
            <a href="bankakampanyalari.html" target="_blank" class="nav-btn nav-btn-primary">🏦 Banka Kampanyaları</a>
            <a href="faturalikampanyalar.html" target="_blank" class="nav-btn nav-btn-faturali">📄 Faturalı Hat Kampanyaları</a>
            <a href="internetkampanyalari.html" target="_blank" class="nav-btn nav-btn-vodafone">📱 Vodafone Kampanyaları</a>
            <a href="parakazan.html" target="_blank" class="nav-btn nav-btn-gold">💰 Para Kazan</a>
            <a href="piyasaanaliz.html" target="_blank" class="nav-btn nav-btn-green">📈 Piyasa Analiz</a>
        </div>
        
        <div class="mutinous-finance-container">
            <div class="finance-header">
                <div class="header-title-zone">
                    <h2>Altın, Borsa ve Piyasa Analizleri</h2>
                </div>
                <div class="update-badge" id="updateBadge">🟢 Canlı Piyasalar: Yükleniyor...</div>
            </div>

            <!-- İçeriklerin tamamı eski yapısıyla buradadır -->
        </div>
        <div class="footer">© 2026 Altın, Borsa ve Piyasa Analizleri | Veriler Canlı Olarak Güncellenir | <a href="https://piyasaanaliz.github.io" target="_blank">piyasaanaliz.github.io</a></div>
    </div>
</body>
</html>
