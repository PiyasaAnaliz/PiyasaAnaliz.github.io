<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altın, Borsa ve Piyasa Analizleri</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0a0a0c; 
            color: #e2e8f0; 
            padding: 15px; 
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .nav-buttons { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin: 15px 0 25px; 
            flex-wrap: wrap; 
        }
        .nav-btn { 
            padding: 10px 24px; 
            border-radius: 30px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 14px; 
            transition: all 0.3s; 
            border: none; 
            cursor: pointer; 
            display: inline-block; 
        }
        .nav-btn-primary { 
            background: #ff4500; 
            color: #fff; 
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3); 
        }
        .nav-btn-primary:hover { 
            background: #ff6a00; 
            transform: scale(1.05); 
        }
        .nav-btn-secondary { 
            background: #1e293b; 
            color: #60a5fa; 
            border: 1px solid #60a5fa;
        }
        .nav-btn-secondary:hover { 
            background: #334155; 
            transform: scale(1.05); 
        }
        .nav-btn-gold { 
            background: #78350f; 
            color: #fbbf24; 
            border: 1px solid #f59e0b;
        }
        .nav-btn-gold:hover { 
            background: #92400e; 
            transform: scale(1.05); 
        }
        .nav-btn-green { 
            background: #064e3b; 
            color: #34d399; 
            border: 1px solid #10b981;
        }
        .nav-btn-green:hover { 
            background: #065f46; 
            transform: scale(1.05); 
        }
        .nav-btn-vodafone {
            background: #e60000;
            color: #ffffff;
            border: 1px solid #b30000;
            box-shadow: 0 4px 12px rgba(230, 0, 0, 0.2);
        }
        .nav-btn-vodafone:hover {
            background: #ff1a1a;
            transform: scale(1.05);
        }
        .nav-btn-faturali {
            background: #4a0404;
            color: #fca5a5;
            border: 1px solid #ef4444;
        }
        .nav-btn-faturali:hover {
            background: #7f1d1d;
            color: #fff;
            transform: scale(1.05);
        }
        
        .mutinous-finance-container {
            background: #121214;
            color: #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            max-width: 1200px;
            margin: 30px auto;
            border: 1px solid #222227;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .finance-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e1e24;
            padding-bottom: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-title-zone h2 { margin: 0; font-size: 24px; color: #fff; letter-spacing: 0.5px; }
        .brand-sub { margin: 4px 0 0 0; font-size: 13px; color: #60a5fa; font-weight: 500; letter-spacing: 0.3px; }
        .update-badge { 
            background: #064e3b; 
            color: #34d399;
            padding: 8px 18px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 700; 
            border: 2px solid #10b981;
            animation: pulse-green 2s ease-in-out infinite;
        }
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
            50% { box-shadow: 0 0 40px rgba(16, 185, 129, 0.5); }
        }
        
        .finance-tabs { display: flex; gap: 6px; margin-bottom: 20px; border-bottom: 1px solid #1e1e24; padding-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { background: #1e1e24; border: 1px solid #2d2d39; color: #94a3b8; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s ease; }
        .tab-btn:hover { background: #2a2a35; color: #fff; }
        .tab-btn.active { background: #ff4500; color: #fff; border-color: #ff4500; }
        .calc-btn { border-color: #3b82f6; color: #60a5fa; }
        .calc-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
        .interest-btn { border-color: #10b981; color: #34d399; }
        .interest-btn.active { background: #10b981; border-color: #10b981; color: #fff; }
        
        .finance-tab-content { display: none; }
        .finance-tab-content.active { display: block; }
        .finance-table-wrapper { max-height: 480px; overflow-y: auto; border-radius: 8px; border: 1px solid #1e1e24; }
        .finance-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        .finance-table th { background: #1e1e24; color: #94a3b8; padding: 12px 16px; font-weight: 600; position: sticky; top: 0; z-index: 2; }
        .finance-table td { padding: 12px 16px; border-bottom: 1px solid #1a1a22; color: #cbd5e1; }
        .finance-table tbody tr:hover { background: #181820; }
        .finance-table tr td:first-child { color: #fff; }
        
        .txt-up { color: #10b981; font-weight: 600; }
        .txt-down { color: #ef4444; font-weight: 600; }
        .txt-neutral { color: #64748b; font-weight: 600; }
        
        .calculator-box { background: #18181c; border: 1px solid #24242b; padding: 20px; border-radius: 8px; }
        .calculator-box h4 { margin: 0 0 15px 0; font-size: 16px; color: #fff; }
        .calc-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .input-group { flex: 1; min-width: 150px; display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 12px; color: #94a3b8; font-weight: 500; }
        .input-group input, .input-group select { background: #121214; border: 1px solid #2d2d39; color: #fff; padding: 10px; border-radius: 6px; font-size: 14px; outline: none; }
        .input-group input:focus, .input-group select:focus { border-color: #3b82f6; }
        .calc-result-zone { background: #1e293b; border-left: 4px solid #3b82f6; padding: 15px; border-radius: 6px; display: flex; flex-direction: column; gap: 4px; }
        .result-label { font-size: 12px; color: #94a3b8; }
        #calc-result-value { font-size: 22px; font-weight: bold; color: #3b82f6; }
        
        .interest-results-wrapper { display: flex; gap: 15px; flex-wrap: wrap; }
        .interest-result-card { flex: 1; min-width: 200px; background: #1e293b; padding: 15px; border-radius: 6px; border-left: 4px solid #10b981; }
        #interest-net-gain { font-size: 22px; font-weight: bold; }
        #interest-total-amount { font-size: 22px; font-weight: bold; color: #fff; }
        
        .banknote { background: #1e293b; border-left: 4px solid #fbbf24; padding: 10px 15px; border-radius: 6px; margin-top: 10px; font-size: 13px; color: #fbbf24; }
        .banknote strong { color: #fff; }
        .banknote a { color: #60a5fa; text-decoration: none; }
        .banknote a:hover { text-decoration: underline; }
        .finance-footer { margin-top: 20px; padding-top: 15px; border-top: 1px solid #1e1e24; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; font-size: 12px; color: #64748b; }
        .warning-text { color: #ef4444; font-weight: 700; font-size: 12px; }
        .footer { text-align: center; margin-top: 20px; color: #64748b; font-size: 14px; }
        .footer a { color: #ff4500; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        .finance-table-wrapper::-webkit-scrollbar { width: 6px; }
        .finance-table-wrapper::-webkit-scrollbar-track { background: #121214; }
        .finance-table-wrapper::-webkit-scrollbar-thumb { background: #2d2d39; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-buttons">
            <a href="https://piyasaanaliz.github.io" target="_blank" class="nav-btn nav-btn-secondary">🏠 Ana Sayfa</a>
            <a href="banka-kampanyalari.html" target="_blank" class="nav-btn nav-btn-primary">🏦 Banka Kampanyaları</a>
            <a href="faturali-kampanyalar.html" target="_blank" class="nav-btn nav-btn-faturali">📄 Faturalı Hat Kampanyaları</a>
            <a href="internet-kampanyalari.html" target="_blank" class="nav-btn nav-btn-vodafone">📱 Vodafone Kampanyaları</a>
            <a href="para-kazan.html" target="_blank" class="nav-btn nav-btn-gold">💰 Para Kazan</a>
            <a href="piyasa-analiz.html" target="_blank" class="nav-btn nav-btn-green">📈 Piyasa Analiz</a>
        </div>
        
        <div class="mutinous-finance-container">
            <div class="finance-header">
                <h2>Altın, Borsa ve Piyasa Analizleri</h2>
            </div>
        </div>
    </div>
</body>
</html>
