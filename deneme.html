<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MutinousTube Finans - Canlı Veri</title>
    <style>
        * { box-sizing: border-box; margin:0; padding:0; }
        body { background:#0a0a0c; color:#e2e8f0; font-family:Segoe UI, sans-serif; padding:20px; }
        .container { max-width:1300px; margin:auto; }
        .card { background:#121214; padding:25px; border-radius:12px; border:1px solid #222; margin-bottom:20px; }
        button { padding:12px 20px; margin:5px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
        .real-btn { background:#10b981; color:white; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:14px; text-align:left; border-bottom:1px solid #333; }
        .up { color:#10b981; } .down { color:#ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>MutinousTube Finans & Emtia Merkezi</h2>
            <button id="realBtn" class="real-btn" onclick="loadLiveData()">🔄 Canlı Verileri Yükle</button>
            <p id="status" style="margin-top:10px; font-size:14px;">Simülasyon modu aktif</p>
        </div>

        <div class="card">
            <h3>Döviz & Altın</h3>
            <table id="forexTable"></table>
        </div>

        <div class="card">
            <h3>Kripto Paralar</h3>
            <table id="cryptoTable"></table>
        </div>
    </div>

    <script>
        let rates = { USD: 47.10, GRAM: 6190, BTC: 64780, ETH: 3430 };

        async function loadLiveData() {
            const status = document.getElementById('realBtn');
            status.textContent = "Yükleniyor...";
            
            try {
                // 1. Döviz (Ücretsiz ve güvenilir)
                const forex = await fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r => r.json());
                rates.USD = forex.rates.TRY || rates.USD;

                // 2. Kripto (CoinGecko - en stabil)
                const crypto = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd,try').then(r => r.json());
                rates.BTC = crypto.bitcoin?.usd || rates.BTC;
                rates.ETH = crypto.ethereum?.usd || rates.ETH;

                document.getElementById('status').innerHTML = '✅ <strong>Canlı veri aktif</strong> (CoinGecko + ExchangeRate)';
                status.textContent = "🔴 Canlı Mod Açık - Yenile";
            } catch (e) {
                document.getElementById('status').innerHTML = '⚠️ Canlı veri alınamadı, simülasyon devam ediyor';
            }
            updateTables();
        }

        function updateTables() {
            // Döviz
            document.getElementById('forexTable').innerHTML = `
                <tr><th>USD / TRY</th><td>${rates.USD.toFixed(4)} TL</td></tr>
                <tr><th>Gram Altın (yaklaşık)</th><td>${rates.GRAM.toFixed(0)} TL</td></tr>
            `;

            // Kripto
            document.getElementById('cryptoTable').innerHTML = `
                <tr><th>Bitcoin (BTC)</th><td>\[ {rates.BTC.toLocaleString()} ≈ ${(rates.BTC * rates.USD).toLocaleString('tr-TR')} TL</td></tr>
                <tr><th>Ethereum (ETH)</th><td> \]{rates.ETH.toLocaleString()} ≈ ${(rates.ETH * rates.USD).toLocaleString('tr-TR')} TL</td></tr>
            `;
        }

        // Otomatik simülasyon (canlı mod kapalıyken)
        setInterval(() => {
            if (document.getElementById('status').textContent.includes('simülasyon')) {
                rates.USD += (Math.random() - 0.5) * 0.1;
                rates.GRAM += (Math.random() - 0.5) * 12;
                updateTables();
            }
        }, 4000);

        window.onload = () => {
            updateTables();
        };
    </script>
</body>
</html>
