<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Canlı Gram Altın Takip</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f4; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .price { font-size: 2em; font-weight: bold; color: #d4af37; }
    </style>
</head>
<body>

<div class="card">
    <h1>Gram Altın</h1>
    <div id="fiyat" class="price">Yükleniyor...</div>
    <p>Veriler anlık piyasadan çekilmektedir.</p>
</div>

<script>
    // Ücretsiz ve CORS sorunu yaratmayan doğrudan veri kaynağı (RSS/Widget mantığı)
    async function fetchGold() {
        try {
            // Döviz.com'un halka açık widget veri kaynağını kullanıyoruz
            const response = await fetch('https://api.doviz.com/api/v1/currencies/gram-altin/latest');
            const data = await response.json();
            document.getElementById('fiyat').innerText = data.selling + " TL";
        } catch (error) {
            document.getElementById('fiyat').innerText = "Veri alınamadı.";
        }
    }
    
    fetchGold();
    setInterval(fetchGold, 10000); // Her 10 saniyede bir güncelle
</script>

</body>
</html>
