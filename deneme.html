<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MutinousTube Finans</title>
    <style>
        * { box-sizing: border-box; margin:0; padding:0; }
        body { background:#0a0a0c; color:#e2e8f0; font-family:Segoe UI, sans-serif; padding:15px; }
        .container { max-width:1200px; margin:auto; }
        .mutinous-finance-container { background:#121214; padding:25px; border-radius:12px; border:1px solid #222; }
        button { padding:10px 20px; margin:5px; border:none; border-radius:8px; cursor:pointer; }
        .real-btn { background:#10b981; color:white; }
        table { width:100%; border-collapse:collapse; margin-top:15px; }
        th, td { padding:12px; text-align:left; border-bottom:1px solid #333; }
        .active { background:#ff4500; color:white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="mutinous-finance-container">
            <h2>MutinousTube Finans & Emtia Merkezi</h2>
            <button id="realBtn" class="real-btn" onclick="toggleMode()">🔄 Gerçek Veri Modu: Kapalı</button>

            <div style="margin-top:20px;">
                <button onclick="switchTab(0)" class="active" id="tab0">Döviz & Altın</button>
                <button onclick="switchTab(1)" id="tab1">Kripto</button>
            </div>

            <div id="content0">
                <table id="forexTable"></table>
            </div>
            <div id="content1" style="display:none;">
                <table id="cryptoTable"></table>
            </div>
        </div>
    </div>

    <script>
        let realMode = false;
        let rates = { USD: 47.10, GRAM: 6190, BTC: 64780, ETH: 3430 };

        async function loadRealData() {
            try {
                const fx = await fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r=>r.json());
                rates.USD = fx.rates.TRY || 47.10;

                const crypto = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd,try').then(r=>r.json());
                rates.BTC = crypto.bitcoin?.usd || 64780;
                rates.ETH = crypto.ethereum?.usd || 3430;
            } catch(e) {}
        }

        function updateDisplay() {
            document.getElementById('forexTable').innerHTML = `
                <tr><th>USD</th><td>${rates.USD.toFixed(4)} TL</td></tr>
                <tr><th>Gram Altın</th><td>${rates.GRAM} TL</td></tr>
            `;
            document.getElementById('cryptoTable').innerHTML = `
                <tr><th>BTC</th><td>\[ {rates.BTC.toLocaleString()} ≈ ${(rates.BTC*rates.USD).toLocaleString('tr-TR')} TL</td></tr>
                <tr><th>ETH</th><td> \]{rates.ETH} ≈ ${(rates.ETH*rates.USD).toLocaleString('tr-TR')} TL</td></tr>
            `;
        }

        function toggleMode() {
            realMode = !realMode;
            const btn = document.getElementById('realBtn');
            btn.textContent = realMode ? "🔴 Gerçek Veri: AÇIK" : "🔄 Gerçek Veri Modu: Kapalı";
            if (realMode) loadRealData();
            updateDisplay();
        }

        function switchTab(n) {
            document.getElementById('content0').style.display = n===0 ? 'block' : 'none';
            document.getElementById('content1').style.display = n===1 ? 'block' : 'none';
            document.getElementById('tab0').classList.toggle('active', n===0);
            document.getElementById('tab1').classList.toggle('active', n===1);
        }

        window.onload = () => {
            updateDisplay();
            setInterval(() => { if(!realMode) updateDisplay(); }, 4000);
        };
    </script>
</body>
</html>
